<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusGate</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN",
          "Hiragino Sans", Meiryo, sans-serif;
        background-color: #f5f6f8;
        color: #2b2f36;
      }

      .card {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      .mark {
        font-size: 40px;
        line-height: 1;
        margin-bottom: 20px;
        opacity: 0.7;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: 600;
      }

      .message {
        margin: 0 0 8px;
        font-size: 15px;
        line-height: 1.7;
        color: #5b616b;
      }

      .site-name {
        font-weight: 600;
        color: #2b2f36;
        word-break: break-all;
      }

      .back-button {
        margin-top: 28px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        color: #2b2f36;
        background-color: #ffffff;
        border: 1px solid #d4d7dd;
        border-radius: 8px;
        cursor: pointer;
      }

      .back-button:hover {
        background-color: #eef0f3;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark" aria-hidden="true">🚪</div>
      <h1>集中モード中です</h1>
      <p class="message">
        <span class="site-name" id="site-name">このサイト</span> は現在ブロックされています。
      </p>
      <p class="message">いまは目の前のことに集中しましょう。</p>
      <button class="back-button" id="back-button" type="button">前のページに戻る</button>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
